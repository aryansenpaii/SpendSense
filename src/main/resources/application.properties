spring.application.name=spendsense-api

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/spendsense?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=password

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration
# Generating a secure 256-bit key (32 bytes) minimum for HS256 algorithm.
app.jwt.secret=9a4f2c8d3b7a1e6f45c8a0b3f267d8b1d4e6f3c8a9d2b5f8e3a9c8b5f6v8a3d9
# 24 hours in milliseconds
app.jwt.expiration-ms=86400000

# Server Configuration
server.port=8080
server.error.include-message=always
